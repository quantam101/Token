name: CI

on:
  push:
    branches: [main, master, "emergent-agent-*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-lint:
    name: Backend lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Ruff check
        run: ruff check backend/server.py backend/llm_router.py backend/optimizer.py --ignore E501,E402,F401
      - name: Ruff format check
        run: ruff format --check backend/server.py backend/llm_router.py backend/optimizer.py

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: frontend
      - name: Build
        run: yarn build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://api.alreadyherellc.com
          CI: "false"

  deploy:
    name: Deploy backend to OCI
    needs: [backend-lint, frontend-build]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          OCI_SSH_KEY: ${{ secrets.OCI_SSH_KEY }}
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          test -n "$OCI_SSH_KEY"
          test -n "$OCI_HOST"
          test -n "$OCI_USER"
          test -n "$JWT_SECRET"
          test -n "$GROQ_API_KEY"
          test -n "$GOOGLE_API_KEY"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.OCI_SSH_KEY }}" | tr -d ' \r\n' | base64 -d > ~/.ssh/deploy_key 2>/dev/null || printf '%s\n' "${{ secrets.OCI_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -l -f ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.OCI_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connectivity
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }} "echo SSH_OK && hostname"

      - name: Deploy Token backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 -o ServerAliveInterval=20 -o ServerAliveCountMax=20 ${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }} << 'ENDSSH'
          set -euo pipefail
          TARGET=/opt/tokenforge
          if [ -d "$TARGET/.git" ]; then
            cd "$TARGET" && git pull origin main
          else
            sudo mkdir -p "$TARGET" && sudo chown $(whoami) "$TARGET"
            git clone "https://x-access-token:${GITHUB_TOKEN}@github.com/quantam101/Token.git" "$TARGET"
            cd "$TARGET"
          fi
          cat > /tmp/be.env << ENV
          MONGO_URL=mongodb://mongo:27017
          DB_NAME=tokenforge
          JWT_SECRET=${JWT_SECRET}
          GROQ_API_KEY=${GROQ_API_KEY}
          GOOGLE_API_KEY=${GOOGLE_API_KEY}
          CORS_ORIGINS=https://forge.alreadyherellc.com
          LLM_POLLINATIONS_FALLBACK=true
          ENV
          sudo cp /tmp/be.env "$TARGET/backend/.env"
          cd "$TARGET"
          sudo docker compose down --remove-orphans
          sudo docker compose up -d --build --remove-orphans backend mongo
          ENDSSH

      - name: Verify API health
        run: |
          sleep 20
          HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" --max-time 15 https://api.alreadyherellc.com/api/health || echo "000")
          cat /tmp/health.json || true
          test "$HTTP" = "200"
