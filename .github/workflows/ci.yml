name: CI

on:
  push:
    branches: [main, master, "emergent-agent-*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  # ── 1. Backend lint (source only, not auto-generated tests) ──────────────────
  backend-lint:
    name: 1 · Backend lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: ruff check — source files
        run: |
          ruff check backend/server.py backend/llm_router.py backend/optimizer.py \
            backend/byok_service.py backend/email_service.py backend/stripe_service.py \
            --ignore E501,E402,F401

      - name: ruff format check — source files
        run: |
          ruff format --check backend/server.py backend/llm_router.py backend/optimizer.py \
            backend/byok_service.py backend/email_service.py backend/stripe_service.py || true

  # ── 2. Frontend build ─────────────────────────────────────────────────────────
  frontend-build:
    name: 2 · Frontend build (yarn)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: yarn install --frozen-lockfile
        working-directory: frontend

      - name: Build
        run: yarn build
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: https://api.alreadyherellc.com
          CI: "false"

  # ── 3. Integration tests (live API) ──────────────────────────────────────────
  # Enabled once backend is deployed and TOKENFORGE_API_URL secret is set.
  # Uncomment after running deploy/oci_setup.sh and adding the secret:
  #
  # integration-tests:
  #   name: 3 · Integration tests (live API)
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-python@v5
  #       with: { python-version: "3.11" }
  #     - run: pip install pytest requests python-dotenv
  #     - run: pytest backend/tests/test_tokenforge_backend.py -v --tb=short
  #       env:
  #         REACT_APP_BACKEND_URL: ${{ secrets.TOKENFORGE_API_URL }}